      "/api/v1/explorer/block-usage":
        {
          "get":
            {
              "tags": ["Explorer"],
              "summary": "Get block usage statistics for a timestamp range",
              "description": "\n            Returns cumulative block usage statistics (gas usage, transaction counts, etc.) for a given timestamp range.\n\n            The API automatically determines the appropriate data granularity based on the size of the time range:\n            - Range ≤ 4,000 seconds: Returns all blocks (~360 data points)\n            - Range ≤ 700,000 seconds: Returns hourly values (~168 data points)\n            - Range ≤ 3,000,000 seconds: Returns daily values (~30 data points)\n            - Range ≤ 35,000,000 seconds: Returns weekly values (~52 data points)\n            - Range > 35,000,000 seconds: Returns monthly values\n\n            Values are represented as a monotonic cumulative counter which means the values increase over time. This is\n            a semantic used by Grafana for example. It requires some processing on the client side to convert to a value\n            for a given block.\n            \n            For example to get the gasUsed at block n you would need to do:\n            \n                gasUsedAtBlockN = gasUsedAtBlockN - gasUsedAtBlock(n-1)\n                \n            In the case where we return hourly/daily/weekly/monthly values only you can calculate an average over the\n            block range. If the first record in the returned data is at block n and the next record is at block n + k:\n            \n                averageGasUsedPerBlock = (gasUsedAtBlock(n+k) - gasUsedAtBlockN) / k\n        ",
              "operationId": "getBlockUsage",
              "parameters":
                [
                  {
                    "name": "startTimestamp",
                    "in": "query",
                    "description": "The starting timestamp in seconds since Unix epoch (inclusive)",
                    "required": true,
                    "schema": { "minimum": 0, "type": "integer", "format": "int64" },
                    "example": 1704067200,
                  },
                  {
                    "name": "endTimestamp",
                    "in": "query",
                    "description": "The ending timestamp in seconds since Unix epoch (inclusive). Must be greater than or equal to startTimestamp.",
                    "required": true,
                    "schema": { "minimum": 0, "type": "integer", "format": "int64" },
                    "example": 1704153600,
                  },
                ],
              "responses":
                {
                  "400":
                    {
                      "description": "Validation errors occurred, eg: invalid input",
                      "content":
                        { "application/json": { "schema": { "$ref": "#/components/schemas/ExceptionResponse" } } },
                    },
                  "500":
                    {
                      "description": "Service not available",
                      "content":
                        { "application/json": { "schema": { "$ref": "#/components/schemas/ExceptionResponse" } } },
                    },
                  "200":
                    {
                      "description": "Success",
                      "content":
                        {
                          "*/*":
                            { "schema": { "type": "array", "items": { "$ref": "#/components/schemas/BlockUsage" } } },
                        },
                    },
                },
            },
        },
