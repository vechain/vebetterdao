{
  "openapi": "3.0.1",
  "info":
    { "title": "VeWorld Indexer API", "description": "Blockchain data indexed for fast querying", "version": "4.6.4" },
  "servers":
    [
      { "url": "/", "description": "Local" },
      { "url": "https://indexer.mainnet.vechain.org", "description": "Mainnet" },
      { "url": "https://indexer.testnet.vechain.org", "description": "Testnet" },
    ],
  "tags":
    [
      { "name": "Stargate", "description": "Stargate related queries" },
      { "name": "VeVote", "description": "Indexer API for VeVote." },
      { "name": "B3TR - X-Allocations", "description": "Query XAllocation voting data on VeBetterDAO." },
      { "name": "B3TR - Galaxy Member NFTs", "description": "Endpoints for Galaxy Member level statistics." },
      { "name": "Transactions", "description": "Query on chain transactions" },
      { "name": "NFT", "description": "Query on chain NFTs" },
      { "name": "TransferEvent", "description": "Query blockchain transfer events" },
      { "name": "VeVote Historic Proposals", "description": "Query VeVote Historic Proposals" },
      { "name": "History", "description": "Query on-chain event history" },
      { "name": "B3TR - Actions", "description": "Endpoints for B3TR Actions." },
      { "name": "Explorer", "description": "Blockchain explorer analytics" },
      { "name": "B3TR - Action Leaderboards", "description": "Leaderboards for B3TR Actions." },
      {
        "name": "Authority Nodes",
        "description": "Indexer API for querying Authority Master Node endorsement information.",
      },
      { "name": "B3TR - Governance Proposals", "description": "Query voting data on VeBetterDAO." },
    ],
  "paths":
    {
      "/api/v2/history/{account}":
        {
          "get":
            {
              "tags": ["History"],
              "summary": "Get account history",
              "operationId": "getUsersHistoryV2",
              "parameters":
                [
                  {
                    "name": "account",
                    "in": "path",
                    "description": "A valid account address",
                    "required": true,
                    "schema": { "pattern": "^(0x)?[0-9a-fA-F]{40}$", "type": "string" },
                    "example": "0xf077b491b355e64048ce21e3a6fc4751eeea77fa",
                  },
                  {
                    "name": "eventName",
                    "in": "query",
                    "description": "Filter by specific transaction names.",
                    "required": false,
                    "schema":
                      {
                        "type": "array",
                        "items":
                          {
                            "type": "string",
                            "enum":
                              [
                                "B3TR_SWAP_VOT3_TO_B3TR",
                                "B3TR_SWAP_B3TR_TO_VOT3",
                                "B3TR_PROPOSAL_SUPPORT",
                                "B3TR_CLAIM_REWARD",
                                "B3TR_UPGRADE_GM",
                                "B3TR_ACTION",
                                "B3TR_PROPOSAL_VOTE",
                                "B3TR_XALLOCATION_VOTE",
                                "TRANSFER_VET",
                                "TRANSFER_FT",
                                "TRANSFER_NFT",
                                "TRANSFER_SF",
                                "SWAP_VET_TO_FT",
                                "SWAP_FT_TO_VET",
                                "SWAP_FT_TO_FT",
                                "UNKNOWN_TX",
                                "NFT_SALE",
                                "STARGATE_DELEGATE_LEGACY",
                                "STARGATE_CLAIM_REWARDS_BASE_LEGACY",
                                "STARGATE_CLAIM_REWARDS_DELEGATE_LEGACY",
                                "STARGATE_UNDELEGATE_LEGACY",
                                "STARGATE_STAKE",
                                "STARGATE_UNSTAKE",
                                "STARGATE_DELEGATE_ACTIVE",
                                "STARGATE_DELEGATE_REQUEST",
                                "STARGATE_DELEGATE_EXIT_REQUEST",
                                "STARGATE_DELEGATION_EXITED_VALIDATOR",
                                "STARGATE_DELEGATION_EXITED",
                                "STARGATE_DELEGATE_REQUEST_CANCELLED",
                                "STARGATE_CLAIM_REWARDS",
                                "STARGATE_BOOST",
                                "STARGATE_MANAGER_ADDED",
                                "STARGATE_MANAGER_REMOVED",
                                "VEVOTE_VOTE_CAST",
                              ],
                          },
                      },
                  },
                  {
                    "name": "searchBy",
                    "in": "query",
                    "description": "Array of fields to search by.",
                    "required": false,
                    "schema":
                      {
                        "type": "array",
                        "items":
                          {
                            "type": "string",
                            "description": "Fields to search by. Defaults to ['to', 'from', 'origin'] if not provided.",
                            "enum": ["to", "from", "origin", "gasPayer"],
                          },
                      },
                  },
                  {
                    "name": "contractAddress",
                    "in": "query",
                    "description": "The contract address",
                    "required": false,
                    "schema": { "pattern": "^(0x)?[0-9a-fA-F]{40}$", "type": "string" },
                  },
                  {
                    "name": "after",
                    "in": "query",
                    "description": "Return transactions after and including this timestamp (Unix time in seconds).",
                    "required": false,
                    "schema": { "type": "long" },
                  },
                  {
                    "name": "before",
                    "in": "query",
                    "description": "Return transactions before and including this timestamp (Unix time in seconds).",
                    "required": false,
                    "schema": { "type": "long" },
                  },
                  {
                    "name": "page",
                    "in": "query",
                    "description": "The results page number",
                    "required": false,
                    "schema": { "type": "Integer" },
                    "example": 0,
                  },
                  {
                    "name": "size",
                    "in": "query",
                    "description": "The results page size",
                    "required": false,
                    "schema": { "type": "Integer" },
                    "example": 20,
                  },
                  {
                    "name": "direction",
                    "in": "query",
                    "description": "The sort direction",
                    "required": false,
                    "schema": { "type": "String", "enum": ["ASC", "DESC"] },
                  },
                ],
              "responses":
                {
                  "400":
                    {
                      "description": "Validation errors occurred, eg: invalid input",
                      "content":
                        { "application/json": { "schema": { "$ref": "#/components/schemas/ExceptionResponse" } } },
                    },
                  "500":
                    {
                      "description": "Service not available",
                      "content":
                        { "application/json": { "schema": { "$ref": "#/components/schemas/ExceptionResponse" } } },
                    },
                  "200":
                    {
                      "description": "Success",
                      "content":
                        {
                          "*/*": { "schema": { "$ref": "#/components/schemas/PaginatedResponseIndexedHistoryEvent" } },
                        },
                    },
                },
            },
        },
