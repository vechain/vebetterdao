name: Deploy Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - dev-testnet

# Only allow one preview deployment per PR at a time
# New commits cancel any in-progress runs for the same PR
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  # AWS Configuration
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: governance-frontend
  TERRAFORM_VERSION: 1.6.0

  # Project Configuration
  PROJECT_NAME: governance-frontend
  BASE_DOMAIN: governance.vebetterdao.org

  # Terraform Paths
  TERRAFORM_DIR: terraform/frontend/frontend-env-level
  TERRAFORM_ENV_DIR: terraform/frontend/environments/env
  TERRAFORM_BACKEND_CONFIG: ../environments/env/preview/backend.config

jobs:
  # Determine which flavors to deploy based on target branch
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      flavors: ${{ steps.determine.outputs.flavors }}
      pr_number: ${{ steps.determine.outputs.pr_number }}
      short_sha: ${{ steps.determine.outputs.short_sha }}
      run_url: ${{ steps.determine.outputs.run_url }}
    steps:
      - name: Determine flavors and metadata
        id: determine
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "run_url=$RUN_URL" >> $GITHUB_OUTPUT
          
          if [ "${{ github.base_ref }}" == "dev-testnet" ]; then
            echo 'flavors=["dev"]' >> $GITHUB_OUTPUT
            echo "::notice::PR to dev-testnet - deploying dev preview"
          elif [ "${{ github.base_ref }}" == "main" ]; then
            echo 'flavors=["staging", "beta"]' >> $GITHUB_OUTPUT
            echo "::notice::PR to main - deploying staging + beta previews"
          else
            echo "::error::Unsupported base branch: ${{ github.base_ref }}"
            exit 1
          fi

  # Post initial "deploying" comment
  comment-deploying:
    name: Post Deploying Comment
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Update PR comment - Deploying
        uses: actions/github-script@v7
        env:
          FLAVORS: ${{ needs.setup.outputs.flavors }}
          PR_NUMBER: ${{ needs.setup.outputs.pr_number }}
          SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
          RUN_URL: ${{ needs.setup.outputs.run_url }}
        with:
          script: |
            const flavors = JSON.parse(process.env.FLAVORS);
            const prNumber = process.env.PR_NUMBER;
            const shortSha = process.env.SHORT_SHA;
            const runUrl = process.env.RUN_URL;
            const baseDomain = process.env.BASE_DOMAIN;
            const commitUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.payload.pull_request.head.sha}`;
            
            let rows = '';
            for (const flavor of flavors) {
              const domain = `pr-${prNumber}-${flavor}.preview.${baseDomain}`;
              rows += `| ${flavor} | ⏳ **Deploying...** | [${domain}](https://${domain}) | [View logs](${runUrl}) |\n`;
            }
            
            const commentBody = [
              '## 🚀 Preview Environment Status',
              '',
              `Building from commit [\`${shortSha}\`](${commitUrl})`,
              '',
              '| Flavor | Status | URL | Logs |',
              '|--------|--------|-----|------|',
              rows.trim(),
              '',
              `_Last updated: ${new Date().toISOString()}_`
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(prNumber),
            });
            
            const existingComment = comments.find(c => 
              c.user.login === 'github-actions[bot]' && 
              c.body.includes('Preview Environment Status')
            );
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(prNumber),
                body: commentBody
              });
            }

  # Build and push Docker image for each flavor
  build-and-push:
    name: Build (${{ matrix.flavor }})
    needs: [setup, comment-deploying]
    strategy:
      matrix:
        flavor: ${{ fromJSON(needs.setup.outputs.flavors) }}
      fail-fast: false
    uses: ./.github/workflows/build-push-ecr.yml
    with:
      ecr_repository: governance-frontend
      image_tag: pr-${{ needs.setup.outputs.pr_number }}-${{ needs.setup.outputs.short_sha }}-${{ matrix.flavor }}
      aws_region: eu-west-1
      environment: "AWS ${{ matrix.flavor }} governance build-time"
    secrets:
      aws_role_arn: ${{ secrets.DEV_AWS_ACC_ROLE }}

  # Deploy preview environment for each flavor
  deploy:
    name: Deploy (${{ matrix.flavor }})
    needs: [setup, build-and-push]
    if: always() && needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flavor: ${{ fromJSON(needs.setup.outputs.flavors) }}
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.DEV_AWS_ACC_ROLE }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install yq
        run: |
          wget -q https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Create preview environment config
        run: |
          # Get values
          PR_NUMBER="${{ needs.setup.outputs.pr_number }}"
          SHORT_SHA="${{ needs.setup.outputs.short_sha }}"
          FLAVOR="${{ matrix.flavor }}"
          
          # Map flavor to domain pattern
          case $FLAVOR in
            "dev") DOMAIN_ENV="dev.testnet" ;;
            "staging") DOMAIN_ENV="staging" ;;
            "beta") DOMAIN_ENV="beta" ;;
            *) DOMAIN_ENV="${FLAVOR}" ;;
          esac
          
          # Define paths
          WORKSPACE_NAME="preview-pr-${PR_NUMBER}-${FLAVOR}"
          IMAGE_TAG="pr-${PR_NUMBER}-${SHORT_SHA}-${FLAVOR}"
          SOURCE_CONFIG="${{ env.TERRAFORM_ENV_DIR }}/${FLAVOR}/${FLAVOR}.yaml"
          TARGET_DIR="${{ env.TERRAFORM_ENV_DIR }}/${WORKSPACE_NAME}"
          TARGET_FILE="${TARGET_DIR}/${WORKSPACE_NAME}.yaml"
          
          echo "=== Preview Config Generation ==="
          echo "PR Number: ${PR_NUMBER}"
          echo "Short SHA: ${SHORT_SHA}"
          echo "Flavor: ${FLAVOR}"
          echo "Domain Env: ${DOMAIN_ENV}"
          echo "Image Tag: ${IMAGE_TAG}"
          echo "Source Config: ${SOURCE_CONFIG}"
          echo "Target File: ${TARGET_FILE}"
          echo ""
          
          # Step 1: Create workspace directory
          mkdir -p "${TARGET_DIR}"
          
          # Step 2: Copy the preview template
          cp "${{ env.TERRAFORM_ENV_DIR }}/preview/preview.yaml.example" "${TARGET_FILE}"
          
          # Step 3: Replace placeholders in the template
          sed -i "s/{PR_NUMBER}/${PR_NUMBER}-${FLAVOR}/g" "${TARGET_FILE}"
          sed -i "s/{COMMIT_SHA}/${SHORT_SHA}/g" "${TARGET_FILE}"
          sed -i "s/{ENVIRONMENT}/${DOMAIN_ENV}/g" "${TARGET_FILE}"
          
          # Step 4: Append flavor-specific config from source environment
          echo "" >> "${TARGET_FILE}"
          echo "# ============================================" >> "${TARGET_FILE}"
          echo "# Dynamic Config from ${FLAVOR} flavor" >> "${TARGET_FILE}"
          echo "# ============================================" >> "${TARGET_FILE}"
          
          # Override image tag
          echo "image_tag: ${IMAGE_TAG}" >> "${TARGET_FILE}"
          
          # Extract and append SSM config from source environment
          if [ -f "${SOURCE_CONFIG}" ]; then
            echo "Extracting config from ${SOURCE_CONFIG}..."
            
            # Extract ssm_parameter_prefix, runtime_env_var_names, and runtime_env_secret_names
            yq eval '{
              "ssm_parameter_prefix": .ssm_parameter_prefix,
              "runtime_env_var_names": (.runtime_env_var_names // []),
              "runtime_env_secret_names": (.runtime_env_secret_names // [])
            } | del(.ssm_parameter_prefix | select(. == null))' "${SOURCE_CONFIG}" >> "${TARGET_FILE}"
          else
            echo "Warning: Source config ${SOURCE_CONFIG} not found. Using defaults."
            echo "runtime_env_var_names: []" >> "${TARGET_FILE}"
            echo "runtime_env_secret_names: []" >> "${TARGET_FILE}"
          fi
          
          # Step 5: Show the generated config for debugging
          echo ""
          echo "=== Generated Preview Config ==="
          cat "${TARGET_FILE}"

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init -backend-config=${{ env.TERRAFORM_BACKEND_CONFIG }}

      - name: Terraform Workspace
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          WORKSPACE_NAME="preview-pr-${{ needs.setup.outputs.pr_number }}-${{ matrix.flavor }}"
          terraform workspace select ${WORKSPACE_NAME} || terraform workspace new ${WORKSPACE_NAME}

      - name: Terraform Apply
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform apply -auto-approve

      - name: Get deployment URL
        working-directory: ${{ env.TERRAFORM_DIR }}
        id: outputs
        run: |
          CUSTOM_URL=$(terraform output -raw custom_domain_url 2>/dev/null || echo "")
          SERVICE_URL=$(terraform output -raw service_url 2>/dev/null || echo "")
          echo "custom_url=${CUSTOM_URL}" >> $GITHUB_OUTPUT
          echo "service_url=${SERVICE_URL}" >> $GITHUB_OUTPUT

  # Update comment with final results
  comment-result:
    name: Update PR Comment
    needs: [setup, build-and-push, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Update PR comment - Results
        uses: actions/github-script@v7
        env:
          FLAVORS: ${{ needs.setup.outputs.flavors }}
          PR_NUMBER: ${{ needs.setup.outputs.pr_number }}
          SHORT_SHA: ${{ needs.setup.outputs.short_sha }}
          RUN_URL: ${{ needs.setup.outputs.run_url }}
          BUILD_RESULT: ${{ needs.build-and-push.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        with:
          script: |
            const flavors = JSON.parse(process.env.FLAVORS);
            const prNumber = process.env.PR_NUMBER;
            const shortSha = process.env.SHORT_SHA;
            const runUrl = process.env.RUN_URL;
            const baseDomain = process.env.BASE_DOMAIN;
            const buildResult = process.env.BUILD_RESULT;
            const deployResult = process.env.DEPLOY_RESULT;
            const commitUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.payload.pull_request.head.sha}`;
            
            let rows = '';
            for (const flavor of flavors) {
              const domain = `pr-${prNumber}-${flavor}.preview.${baseDomain}`;
              
              let status;
              if (buildResult === 'failure') {
                status = '❌ **Build Failed**';
              } else if (deployResult === 'failure') {
                status = '❌ **Deploy Failed**';
              } else if (deployResult === 'success') {
                status = '✅ **Ready**';
              } else {
                status = '⚠️ **Unknown**';
              }
              
              rows += `| ${flavor} | ${status} | [${domain}](https://${domain}) | [View logs](${runUrl}) |\n`;
            }
            
            const commentBody = [
              '## 🚀 Preview Environment Status',
              '',
              `Built from commit [\`${shortSha}\`](${commitUrl})`,
              '',
              '| Flavor | Status | URL | Logs |',
              '|--------|--------|-----|------|',
              rows.trim(),
              '',
              '> ⏱️ **Note:** Custom domains may take 5-10 minutes to activate on first deployment.',
              '',
              `_Last updated: ${new Date().toISOString()}_`,
              '',
              '_Preview environments are automatically destroyed when PRs are closed._'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(prNumber),
            });
            
            const existingComment = comments.find(c => 
              c.user.login === 'github-actions[bot]' && 
              c.body.includes('Preview Environment Status')
            );
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(prNumber),
                body: commentBody
              });
            }

      - name: Deployment summary
        if: needs.deploy.result == 'success'
        env:
          FLAVORS: ${{ needs.setup.outputs.flavors }}
          PR_NUMBER: ${{ needs.setup.outputs.pr_number }}
        run: |
          echo "### Preview Environments Deployed! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PR:** #${{ needs.setup.outputs.pr_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Flavor | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----|" >> $GITHUB_STEP_SUMMARY
          for flavor in $(echo '${{ needs.setup.outputs.flavors }}' | jq -r '.[]'); do
            echo "| ${flavor} | https://pr-${{ needs.setup.outputs.pr_number }}-${flavor}.preview.${{ env.BASE_DOMAIN }} |" >> $GITHUB_STEP_SUMMARY
          done
