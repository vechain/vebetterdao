name: Deploy Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - dev-testnet
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull Request Number (e.g., 123)"
        required: true
        type: string
      flavor:
        description: "Preview Flavor"
        required: true
        type: choice
        options:
          - staging
          - dev
          - prod
        default: "prod"

concurrency:
  group: preview-pr-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

env:
  # AWS Configuration
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: governance-frontend
  TERRAFORM_VERSION: 1.6.0
  
  # Project Configuration
  PROJECT_NAME: governance-frontend
  
  # Terraform Paths
  TERRAFORM_DIR: terraform/frontend/frontend-env-level
  TERRAFORM_ENV_DIR: terraform/frontend/environments/env
  TERRAFORM_BACKEND_CONFIG: ../environments/env/preview/backend.config

jobs:
  determine-flavor:
    name: Determine Flavor
    runs-on: ubuntu-latest
    outputs:
      flavor: ${{ steps.metadata.outputs.flavor }}
      environment: ${{ steps.metadata.outputs.environment }}
      domain_env: ${{ steps.metadata.outputs.domain_env }}
      pr_number: ${{ steps.metadata.outputs.pr_number }}
      short_sha: ${{ steps.metadata.outputs.short_sha }}
      image_tag: ${{ steps.git.outputs.image_tag }}
    steps:
      - name: Determine Flavor and Params
        id: metadata
        run: |
          # Default values
          FLAVOR=""
          ENVIRONMENT=""
          DOMAIN_ENV=""
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            FLAVOR="${{ inputs.flavor }}"
            PR_NUMBER="${{ inputs.pr_number }}"
          elif [ "${{ github.base_ref }}" == "dev-testnet" ]; then
            FLAVOR="dev"
            PR_NUMBER="${{ github.event.pull_request.number }}"
          else
            FLAVOR="staging"
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi
          
          # Map flavor to Environment and Domain pattern
          case $FLAVOR in
            "dev")
              ENVIRONMENT="preview-dev"
              DOMAIN_ENV="preview-dev"
              ;;
            "prod")
              ENVIRONMENT="preview-prod"
              DOMAIN_ENV="preview-prod"
              ;;
            *)
              ENVIRONMENT="preview-staging"
              DOMAIN_ENV="preview-staging"
              ;;
          esac
          
          echo "flavor=${FLAVOR}" >> $GITHUB_OUTPUT
          echo "environment=${ENVIRONMENT}" >> $GITHUB_OUTPUT
          echo "domain_env=${DOMAIN_ENV}" >> $GITHUB_OUTPUT
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT

      - name: Checkout to get SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }} # Checkout specific commit if PR
      
      - name: Get Git Details
        id: git
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SHORT_SHA=$(git rev-parse --short HEAD)
          else
            SHORT_SHA=$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-7)
          fi
          
          PR_NUMBER="${{ steps.metadata.outputs.pr_number }}"
          IMAGE_TAG="pr-${PR_NUMBER}-${SHORT_SHA}-${{ steps.metadata.outputs.flavor }}"
          
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          
          # Add back to metadata outputs for convenience
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

  pr-comment:
    name: Post Initial PR Comment
    runs-on: ubuntu-latest
    needs: [determine-flavor]
    permissions:
      pull-requests: write
    steps:
      - name: Post initial PR comment
        uses: actions/github-script@v7
        env:
          FLAVOR: ${{ needs.determine-flavor.outputs.flavor }}
          SHORT_SHA: ${{ needs.determine-flavor.outputs.short_sha }}
          PR_NUMBER: ${{ needs.determine-flavor.outputs.pr_number }}
          PROJECT_NAME: ${{ env.PROJECT_NAME }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER);
            const flavor = process.env.FLAVOR;
            const commitSha = process.env.SHORT_SHA;
            const projectName = process.env.PROJECT_NAME;
            
            const flavorLabel = flavor.charAt(0).toUpperCase() + flavor.slice(1);
            const body = `## ${projectName} – ${flavorLabel} Preview
            
            | Name | Flavor | Status | Updated (UTC) |
            |------|--------|--------|---------------|
            | **${projectName}-preview** | ${flavorLabel} | 🔨 Building... | ${new Date().toISOString().replace('T', ' ').substring(0, 19)} |
            
            ---
            <sub>Building with commit ${commitSha}</sub>`;
            
            // Find existing comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            
            const existingComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes(`${projectName} –`) &&
              comment.body.includes("Preview")
            );
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }

  build-and-push:
    needs: [determine-flavor]
    uses: ./.github/workflows/build-push-ecr.yml
    with:
      ecr_repository: governance-frontend
      image_tag: ${{ needs.determine-flavor.outputs.image_tag }}
      aws_region: eu-west-1
      environment: ${{ needs.determine-flavor.outputs.environment }}
    secrets:
      aws_role_arn: ${{ secrets.DEV_AWS_ACC_ROLE }}

  deploy:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [determine-flavor, build-and-push]
    environment:
      name: ${{ needs.determine-flavor.outputs.environment }}
      url: https://pr-${{ needs.determine-flavor.outputs.pr_number }}.preview-staging.governance.vebetterdao.org
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.DEV_AWS_ACC_ROLE }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install yq
        run: |
          wget https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Create preview environment config
        run: |
          PR_NUMBER=${{ needs.determine-flavor.outputs.pr_number }}
          SHORT_SHA=${{ needs.determine-flavor.outputs.short_sha }}
          FLAVOR=${{ needs.determine-flavor.outputs.flavor }}
          IMAGE_TAG=${{ needs.determine-flavor.outputs.image_tag }}
          DOMAIN_ENV=${{ needs.determine-flavor.outputs.domain_env }}
          
          WORKSPACE_NAME="preview-pr-${PR_NUMBER}"
          SOURCE_CONFIG="${{ env.TERRAFORM_ENV_DIR }}/${FLAVOR}/${FLAVOR}.yaml"
          TARGET_FILE="${{ env.TERRAFORM_ENV_DIR }}/${WORKSPACE_NAME}/${WORKSPACE_NAME}.yaml"
          
          # Create workspace directory
          mkdir -p "${{ env.TERRAFORM_ENV_DIR }}/${WORKSPACE_NAME}"
          
          # Copy template
          cp "${{ env.TERRAFORM_ENV_DIR }}/preview/preview.yaml.example" "${TARGET_FILE}"
          
          # Replace values
          sed -i "s/{PR_NUMBER}/${PR_NUMBER}/g" "${TARGET_FILE}"
          sed -i "s/{COMMIT_SHA}/${SHORT_SHA}/g" "${TARGET_FILE}"
          sed -i "s/{ENVIRONMENT}/${DOMAIN_ENV}/g" "${TARGET_FILE}"
          
          # Append Flavor-specific config using yq to merge/extract
          echo "" >> "${TARGET_FILE}"
          echo "# Dynamic Config from ${FLAVOR}" >> "${TARGET_FILE}"
          echo "# Image tag override" >> "${TARGET_FILE}"
          echo "image_tag: ${IMAGE_TAG}" >> "${TARGET_FILE}"
          
          echo "Extracting config from ${SOURCE_CONFIG}..."
          
          if [ -f "${SOURCE_CONFIG}" ]; then
            # Extract relevant keys, defaulting lists to empty if missing, and omitting ssm_parameter_prefix if null
            yq eval '{"ssm_parameter_prefix": .ssm_parameter_prefix, "runtime_env_var_names": (.runtime_env_var_names // []), "runtime_env_secret_names": (.runtime_env_secret_names // [])} | del(.ssm_parameter_prefix | select(. == null))' "${SOURCE_CONFIG}" >> "${TARGET_FILE}"
          else
            echo "Warning: Source config ${SOURCE_CONFIG} not found. Using defaults."
            # Ensure lists are present to prevent Terraform errors
            echo "runtime_env_var_names: []" >> "${TARGET_FILE}"
            echo "runtime_env_secret_names: []" >> "${TARGET_FILE}"
          fi
          
          echo "Generated config:"
          cat "${TARGET_FILE}"

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init -backend-config=${{ env.TERRAFORM_BACKEND_CONFIG }}

      - name: Terraform Apply
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          WORKSPACE_NAME="preview-pr-${{ needs.determine-flavor.outputs.pr_number }}"
          terraform workspace select ${WORKSPACE_NAME} || terraform workspace new ${WORKSPACE_NAME}
          terraform apply -auto-approve

      - name: Get deployment URL
        working-directory: ${{ env.TERRAFORM_DIR }}
        id: outputs
        run: |
          CUSTOM_URL=$(terraform output -raw custom_domain_url || echo "")
          SERVICE_URL=$(terraform output -raw service_url || echo "")
          echo "custom_url=${CUSTOM_URL}" >> $GITHUB_OUTPUT
          echo "service_url=${SERVICE_URL}" >> $GITHUB_OUTPUT

  update-comment:
    name: Update PR Comment
    runs-on: ubuntu-latest
    needs: [determine-flavor, pr-comment, build-and-push, deploy]
    if: always() && needs.pr-comment.result == 'success'
    permissions:
      pull-requests: write
    steps:
      - name: Update PR comment
        uses: actions/github-script@v7
        env:
          FLAVOR: ${{ needs.determine-flavor.outputs.flavor }}
          SHORT_SHA: ${{ needs.determine-flavor.outputs.short_sha }}
          PR_NUMBER: ${{ needs.determine-flavor.outputs.pr_number }}
          PROJECT_NAME: ${{ env.PROJECT_NAME }}
          BUILD_RESULT: ${{ needs.build-and-push.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          CUSTOM_URL: ${{ needs.deploy.outputs.custom_url }}
          SERVICE_URL: ${{ needs.deploy.outputs.service_url }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER);
            const flavor = process.env.FLAVOR;
            const flavorLabel = flavor.charAt(0).toUpperCase() + flavor.slice(1);
            const projectName = process.env.PROJECT_NAME;
            const buildResult = process.env.BUILD_RESULT;
            const deployResult = process.env.DEPLOY_RESULT;
            
            let status = '⚠️ Unknown';
            let links = `[View Logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            
            if (buildResult === 'failure') status = '❌ Build Failed';
            else if (deployResult === 'failure') status = '❌ Deploy Failed';
            else if (deployResult === 'success') {
              status = '✅ Ready';
              links = `[Custom Domain](${process.env.CUSTOM_URL}) • [Service URL](${process.env.SERVICE_URL})`;
            }
            
            const body = `## ${projectName} – ${flavorLabel} Preview
            
            | Name | Flavor | Status | Preview | Updated (UTC) |
            |------|--------|--------|---------|---------------|
            | **${projectName}-preview** | ${flavorLabel} | ${status} | ${links} | ${new Date().toISOString().replace('T', ' ').substring(0, 19)} |
            
            ---
            <sub>Built with commit ${process.env.SHORT_SHA}</sub>`;
            
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            
            const existingComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes(`${projectName} –`)
            );
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body
              });
            }
