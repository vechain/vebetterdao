name: Unit Testing

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - testnet
  push:
    branches:
      - main
      - Comment-only-solidity-changes
      - testnet

jobs:
  run-unit-tests:
    name: Unit Testing
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node v20
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check for Solidity changes
        uses: dorny/paths-filter@v3
        id: contract_changes
        with:
          filters: |
            src:
              - 'packages/contracts/contracts/**'

      - name: Compile
        run: yarn contracts:compile

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        id: slither
        if: steps.contract_changes.outputs.src == 'true'
        with:
          target: "packages/contracts/"
          solc-version: "0.8.20"
          fail-on: none
          slither-args: --filter-paths "openzeppelin" --exclude-informational --exclude-optimization --checklist --markdown-root ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/

      - name: Create/update checklist as PR comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && steps.contract_changes.outputs.src == 'true'
        env:
          REPORT: ${{ steps.slither.outputs.stdout }}
        with:
          script: |
            const script = require('.github/scripts/comment')
            const header = '# Slither report'
            const body = process.env.REPORT
            await script({ github, context, header, body })
