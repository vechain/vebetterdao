name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "Terraform action to perform"
        required: true
        default: "deploy"
        type: choice
        options:
          - dry-run
          - deploy

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: block-explorer
  ENVIRONMENT: prod
  TERRAFORM_VERSION: 1.6.0

jobs:
  validate-version-format:
    name: Confirm Version Format
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.validate-version-format.outputs.image_tag }}
    steps:
      - name: Confirm Version Format
        id: validate-version-format
        run: |
          if [[ "${{ github.ref_name }}" == v.* ]]; then
            echo "image_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "error: Invalid version format. Expected v.X.Y.Z. Select a version tag when dispatching the workflow."
            exit 1
          fi
  check-existing-release:
    name: Check Existing Releases
    runs-on: ubuntu-latest
    needs: validate-version-format
    outputs:
      NEW_RELEASE: ${{ steps.check-release.outputs.NEW_RELEASE }}
    steps:
      - name: Check if deployment version already exists
        id: check-release
        env:
          VERSION: ${{ needs.validate-version-format.outputs.image_tag }}
        run: |
          VERSION=${{ env.VERSION }}
          RELEASES=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases)
          if echo "$RELEASES" | jq -e ".[] | select(.tag_name==\"$VERSION\")"; then
            echo "NEW_RELEASE=false" >> $GITHUB_OUTPUT
          else
            echo "NEW_RELEASE=true" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: validate-version-format
    uses: ./.github/workflows/build-push-ecr.yml
    with:
      ecr_repository: block-explorer
      image_tag: ${{ needs.validate-version-format.outputs.image_tag }}
      aws_region: eu-west-1
    secrets:
      aws_role_arn: ${{ secrets.AWS_ACC_ROLE }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    permissions:
      id-token: write
      contents: read
    environment:
      name: prod
      url: https://block-explorer.vechain.org

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ACC_ROLE }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Update prod config with new image tag
        run: |
          cd terraform/environments/prod
          sed -i "s/^image_tag:.*/image_tag: ${{ needs.build-and-push.outputs.tag }}/" prod.yaml
          cat prod.yaml

      - name: Terraform Init
        working-directory: terraform/frontend
        run: |
          terraform init -backend-config=../environments/prod/backend.config

      - name: Terraform Workspace
        working-directory: terraform/frontend
        run: |
          terraform workspace select prod

      - name: Terraform Plan
        working-directory: terraform/frontend
        run: |
          terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.terraform_action == 'deploy')
        working-directory: terraform/frontend
        run: |
          terraform apply -auto-approve tfplan

      - name: Get deployment URL
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.terraform_action == 'deploy')
        working-directory: terraform/frontend
        id: outputs
        run: |
          CUSTOM_URL=$(terraform output -raw custom_domain_url || echo "")
          SERVICE_URL=$(terraform output -raw service_url || echo "")
          echo "custom_url=${CUSTOM_URL}" >> $GITHUB_OUTPUT
          echo "service_url=${SERVICE_URL}" >> $GITHUB_OUTPUT

      - name: Deployment summary
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.terraform_action == 'deploy')
        run: |
          echo "### Production Deployment Complete! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** \`${{ needs.build-and-push.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.outputs.outputs.custom_url }}" ]; then
            echo "**Custom Domain:** ${{ steps.outputs.outputs.custom_url }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**Service URL:** ${{ steps.outputs.outputs.service_url }}" >> $GITHUB_STEP_SUMMARY

  create-release:
    runs-on: ubuntu-latest
    needs: [build-and-push, check-existing-release, deploy]
    if: ${{ needs.check-existing-release.outputs.NEW_RELEASE == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          tag: ${{ needs.build-and-push.outputs.tag }}
        run: |
          latest_release=$(curl -s -H "Authorization: token ${{ github.token }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.tag_name')
          echo "Latest release: ${latest_release}"
          gh release create "${tag}" \
              --repo="${{ github.repository }}" \
              --title="Release ${tag}" \
              --generate-notes \
              --notes-start-tag "${latest_release}"
