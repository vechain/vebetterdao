# Deploy to Production via manual workflow dispatch
name: Deploy Frontend - Production

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "Terraform action to perform"
        required: true
        default: "deploy"
        type: choice
        options:
          - dry-run
          - deploy

jobs:
  validate-ref:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.validate.outputs.tag_name }}
    steps:
      - name: Validate version tag format
        id: validate
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          REF="${REF_NAME}"
          if [[ "$REF" == v.* ]]; then
            echo "tag_name=${REF}" >> $GITHUB_OUTPUT
            echo "::notice::Deploying version ${REF} to production"
          else
            echo "::error::Production deployments must be triggered from a version tag (v.*). Current ref: ${REF}"
            exit 1
          fi

  check-existing-release:
    name: Check Existing Releases
    runs-on: ubuntu-latest
    needs: validate-ref
    outputs:
      NEW_RELEASE: ${{ steps.check-release.outputs.NEW_RELEASE }}
    steps:
      - name: Check if deployment version already exists
        id: check-release
        env:
          VERSION: ${{ needs.validate-ref.outputs.tag_name }}
        run: |
          VERSION=${{ env.VERSION }}
          RELEASES=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases)
          if echo "$RELEASES" | jq -e ".[] | select(.tag_name==\"$VERSION\")"; then
            echo "NEW_RELEASE=false" >> $GITHUB_OUTPUT
          else
            echo "NEW_RELEASE=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    name: Deploy to Production
    needs: validate-ref
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    uses: ./.github/workflows/deploy-fe.yml
    secrets: inherit
    with:
      environment: prod
      image_tag: ${{ needs.validate-ref.outputs.tag_name }}
      terraform_action: ${{ inputs.terraform_action }}

  create-release:
    runs-on: ubuntu-latest
    needs: [deploy, validate-ref, check-existing-release]
    if: ${{ needs.check-existing-release.outputs.NEW_RELEASE == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          tag: ${{ needs.validate-ref.outputs.tag_name }}
        run: |
          latest_release=$(curl -s -H "Authorization: token ${{ github.token }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.tag_name')
          echo "Latest release: ${latest_release}"
          gh release create "${tag}" \
              --repo="${{ github.repository }}" \
              --title="Release ${tag}" \
              --generate-notes \
              --notes-start-tag "${latest_release}"
