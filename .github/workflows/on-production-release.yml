name: Vercel Production Deployment
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
on:
  # Only run this workflow if the pull request against main was merged
  pull_request:
    branches:
      - main
    types: [closed]
jobs:
  Deploy-Production:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Get version in package.json
        id: package-version
        uses: notiz-dev/github-action-json-property@release
        with:
          path: "apps/frontend/package.json"
          prop_path: "version"
      - name: Ensure the manifest version matches the tag version
        if: ${{ steps.package-version.outputs.prop != github.ref_name }}
        uses: actions/github-script@v6
        with:
          script: |
            core.setFailed('The version in the package must match the tag.')
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
