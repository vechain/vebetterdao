name: Route53 Records Management

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/route53/**'
  workflow_dispatch:

jobs:
  route53-plan:
    name: Route53 Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
    outputs:
      plan_changes_detected: ${{ steps.check_changes.outputs.plan_changes_detected }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ACCESS_ROLE }}
          aws-region: eu-west-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: 1.7.3
    
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.VECHAINCI_SSH_PRIVATE_KEYS }}

      - name: Terraform Format
        id: fmt
        working-directory: terraform/route53
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        working-directory: terraform/route53
        run: terraform init

      - name: Terraform Workspace
        working-directory: terraform/route53
        id: workspace
        run: terraform workspace select prod
    
      - name: Terraform Validate
        working-directory: terraform/route53
        id: validate
        run: terraform validate

      - name: Terraform Plan Route53
        working-directory: terraform/route53
        id: plan
        run: terraform plan -out=route53.tfplan -detailed-exitcode
    
      - name: Check for plan changes
        id: check_changes
        run: |
          if [ ${{ steps.plan.outcome }} == 'success' ] && [ ${{ steps.plan.outputs.exitcode }} == 2 ]; then
            echo "Changes detected"
            echo "plan_changes_detected=true" >> $GITHUB_OUTPUT
          else
            echo "No changes detected"
            echo "plan_changes_detected=false" >> $GITHUB_OUTPUT
          fi
        shell: bash
        continue-on-error: false

      - name: Upload Plan
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: route53-plan
          path: terraform/route53.tfplan
          retention-days: 5

  route53-apply:
    name: Route53 Deploy Records
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
    needs: route53-plan
    if: |
      needs.route53-plan.outputs.plan_changes_detected == 'true' && 
      github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ACCESS_ROLE }}
          aws-region: eu-west-1

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ secrets.VECHAINCI_SSH_PRIVATE_KEYS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: 1.7.3

      - name: Terraform Init
        working-directory: terraform/route53
        run: |
          terraform init
          terraform workspace select prod
      
      - name: Terraform Plan
        working-directory: terraform/route53
        run: terraform plan

      - name: Terraform Apply Route53
        working-directory: terraform/route53
        run: terraform apply -auto-approve
