name: Deploy Storybook

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "apps/frontend/**"
      - "packages/**"
      - ".github/workflows/deploy-storybook.yml"

concurrency:
  group: deploy-storybook
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
      CLOUDFRONT_DISTRIBUTION_ID: E1PQQGLHX5GA37
      S3_BUCKET_NAME: dev-b3tr-storybook-20251209120228832400000002

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Storybook
        run: yarn --cwd apps/frontend build-storybook

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ACC_ROLE }}
          aws-region: eu-west-1

      - name: Upload to S3
        run: |
          aws s3 sync ./apps/frontend/storybook-static s3://${{ env.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront cache
        run: |
          AWS_MAX_ATTEMPTS=10 aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths '/' '/*'

      - name: Deployment summary
        run: |
          echo "## 🚀 Storybook Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Git Ref | ${{ github.ref }} |" >> $GITHUB_STEP_SUMMARY
          echo "| S3 Bucket | ${{ env.S3_BUCKET_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CloudFront ID | ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://storybook.dev.b3tr.vechain.org |" >> $GITHUB_STEP_SUMMARY
