name: Build & Deploy Storybook (CloudFront/S3)

on:
  workflow_dispatch:

  workflow_call:
    inputs:
      git_ref:
        description: Git ref to checkout (tag, branch, or SHA)
        required: false
        type: string

concurrency:
  group: deploy-storybook-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: storybook
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "yarn"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/yarn.lock') }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Storybook
        run: yarn build-storybook
        env:
          NEXT_PUBLIC_APP_ENV: staging

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ACC_ROLE }}
          aws-region: eu-west-1

      - name: Upload to S3
        run: |
          aws s3 sync ./apps/frontend/storybook-static s3://${{ vars.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront cache
        run: |
          AWS_MAX_ATTEMPTS=10 aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths '/' '/*'

      - name: Deployment summary
        run: |
          echo "## 🚀 Storybook Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Git Ref | ${{ inputs.git_ref || github.ref }} |" >> $GITHUB_STEP_SUMMARY
          echo "| S3 Bucket | ${{ vars.S3_BUCKET_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CloudFront ID | ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://storybook.b3tr.vechain.org |" >> $GITHUB_STEP_SUMMARY

