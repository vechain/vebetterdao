name: Relayer Cast Vote Lambda Deployment

on:
  pull_request:
    paths:
      - 'terraform/relayer-cast-vote/**'
      - 'packages/lambda/src/relayerCastVote/**'
      - '.github/workflows/relayer-cast-vote-lambda-deploy.yml'
  workflow_dispatch:
    inputs:
      workspace:
        description: 'Terraform workspace to use (dev, prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  build:
    name: Build Lambda
    permissions:
      contents: read
    uses: ./.github/workflows/lambda-build.yml
    with:
      workspace: ${{ github.event.inputs.workspace || 'dev' }}
    secrets:
      TESTNET_MNEMONIC: ${{ secrets.TESTNET_MNEMONIC }}
      MAINNET_MNEMONIC: ${{ secrets.MAINNET_MNEMONIC }}

  deploy:
    name: Deploy Infrastructure
    needs: build
    permissions:
      id-token: write
      contents: read
      pull-requests: read
    uses: ./.github/workflows/lambda-infrastructure-deploy.yml
    with:
      workspace: ${{ github.event.inputs.workspace || 'dev' }}
      lambda_name: relayerCastVote
      terraform_dir: terraform/relayer-cast-vote
    secrets:
      AWS_ACCESS_ROLE: ${{ secrets.AWS_ACCESS_ROLE }}
      DEV_AWS_ACC_ROLE: ${{ secrets.DEV_AWS_ACC_ROLE }}
      VECHAINCI_SSH_PRIVATE_KEYS: ${{ secrets.VECHAINCI_SSH_PRIVATE_KEYS }}

