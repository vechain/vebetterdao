name: Check Endorsement Lambda Deployment

on:
  pull_request:
    paths:
      - 'terraform/check-endorsement/**'
      - 'lambda/src/checkEndorsements/**'
      - '.github/workflows/check-endorsement-lambda-deploy.yml'
  workflow_dispatch:
    inputs:
      workspace:
        description: 'Terraform workspace to use (dev, prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read
  pull-requests: read

jobs:
  build:
    name: Build Lambda
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: '**/yarn.lock'

      - name: Install dependencies
        run: |
          echo "Installing project dependencies..."
          yarn install --frozen-lockfile
          echo "Installing esbuild globally..."
          yarn global add esbuild
          echo "Verify esbuild installation..."
          esbuild --version

      - name: Build Lambda
        env:
          TESTNET_MNEMONIC: ${{ secrets.TESTNET_MNEMONIC }}
          MAINNET_MNEMONIC: ${{ secrets.MAINNET_MNEMONIC }}
        run: |
          # Set environment variables based on workspace
          set +x  # Disable command echoing
          if [ "${{ github.event.inputs.workspace || 'dev' }}" == "dev" ]; then
            export MNEMONIC="$TESTNET_MNEMONIC"
          else
            export MNEMONIC="$MAINNET_MNEMONIC"
          fi
          set -x  # Re-enable command echoing

          # Build lambda
          cd packages/lambda
          echo "Running yarn build..."
          yarn build || { echo "Lambda build failed"; exit 1; }

  deploy:
    name: Deploy Infrastructure
    needs: build
    uses: ./.github/workflows/lambda-infrastructure-deploy.yml
    with:
      workspace: ${{ github.event.inputs.workspace || 'dev' }}
      lambda_name: checkEndorsements
      terraform_dir: terraform/check-endorsement
    secrets:
      AWS_ACCESS_ROLE: ${{ secrets.AWS_ACCESS_ROLE }}
      DEV_AWS_ACC_ROLE: ${{ secrets.DEV_AWS_ACC_ROLE }}
      VECHAINCI_SSH_PRIVATE_KEYS: ${{ secrets.VECHAINCI_SSH_PRIVATE_KEYS }}

