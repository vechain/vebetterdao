name: Validate PR Label
on:
  pull_request:
    branches:
      - main
    types: [opened, reopened, labeled, unlabeled, synchronize]
  workflow_dispatch:

jobs:
  validate:
    uses: vechain/github-actions-public/.github/workflows/validate-pr-label.yaml@b3ab84727d2c8fe86a6a7ce6963c82486afbaa49 # v.2.1.1
    with:
      FAIL_IF_MISSING_LABEL: true
