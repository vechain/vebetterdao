# Terraform workflow for storybook infrastructure
name: Terraform - Storybook Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action (plan or apply)
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: storybook
    defaults:
      run:
        working-directory: terraform/storybook

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ACC_ROLE }}
          aws-region: eu-west-1

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="environments/prod/backend.config"

      - name: Select or Create Workspace
        run: |
          terraform workspace select prod || \
          terraform workspace new prod

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -no-color
        continue-on-error: true

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        if: inputs.action == 'apply'
        id: outputs
        run: |
          echo "## Terraform Outputs for Storybook" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform output >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** After initial apply, you'll need to:" >> $GITHUB_STEP_SUMMARY
          echo "1. Get the S3 bucket name and CloudFront distribution ID from AWS Console" >> $GITHUB_STEP_SUMMARY
          echo "2. Update the GitHub environment variables:" >> $GITHUB_STEP_SUMMARY
          echo "   - \`S3_BUCKET_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "   - \`CLOUDFRONT_DISTRIBUTION_ID\`" >> $GITHUB_STEP_SUMMARY

