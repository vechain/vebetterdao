name: Lambda Infrastructure

on:
  workflow_dispatch:
    inputs:
      workspace:
        description: 'Terraform workspace to use (dev, prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      lambda_name:
        description: 'Name of the Lambda function to deploy'
        required: true
        type: string
      terraform_dir:
        description: 'Directory containing the Terraform configuration'
        required: true
        type: string
  workflow_call:
    inputs:
      workspace:
        required: true
        type: string
      lambda_name:
        required: true
        type: string
      terraform_dir:
        required: true
        type: string
    secrets:
      AWS_ACCESS_ROLE:
        required: true
      DEV_AWS_ACC_ROLE:
        required: true
      VECHAINCI_SSH_PRIVATE_KEYS:
        required: true

permissions:
  id-token: write
  contents: read
  pull-requests: read

jobs:
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ github.event.inputs.workspace == 'prod' && secrets.AWS_ACCESS_ROLE || secrets.DEV_AWS_ACC_ROLE }}
          aws-region: eu-west-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0
          terraform_wrapper: false
    
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VECHAINCI_SSH_PRIVATE_KEYS }}

      - name: Terraform Format
        id: fmt
        working-directory: ${{ github.event.inputs.terraform_dir || inputs.terraform_dir }}
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        working-directory: ${{ github.event.inputs.terraform_dir || inputs.terraform_dir }}
        run: |
          WORKSPACE="${{ github.event.inputs.workspace || inputs.workspace || 'dev' }}"
          BUCKET="b3tr-terraform-state-${WORKSPACE}"
          
          terraform init -backend-config="bucket=${BUCKET}"

      - name: Terraform Workspace
        working-directory: ${{ github.event.inputs.terraform_dir || inputs.terraform_dir }}
        id: workspace
        run: |
          WORKSPACE="${{ github.event.inputs.workspace || inputs.workspace || 'dev' }}"
          
          if ! terraform workspace list | grep -q "$WORKSPACE"; then
            terraform workspace new "$WORKSPACE"
          else
            terraform workspace select "$WORKSPACE"
          fi
    
      - name: Terraform Validate
        working-directory: ${{ github.event.inputs.terraform_dir || inputs.terraform_dir }}
        id: validate
        run: terraform validate

      - name: Check for Lambda Build
        id: check_build
        run: |
          WORKSPACE="${{ github.event.inputs.workspace || inputs.workspace || 'dev' }}"
          LAMBDA_NAME="${{ github.event.inputs.lambda_name || inputs.lambda_name }}"
          
          if [ "$WORKSPACE" == "dev" ]; then
            BUILD_PATH="packages/lambda/dist/staging/${LAMBDA_NAME}/index.zip"
          else
            BUILD_PATH="packages/lambda/dist/mainnet/${LAMBDA_NAME}/index.zip"
          fi
          
          if [ ! -f "$BUILD_PATH" ]; then
            echo "Error: Lambda build not found at $BUILD_PATH"
            exit 1
          fi
          echo "Lambda build found at $BUILD_PATH"

      - name: Terraform Plan
        working-directory: ${{ github.event.inputs.terraform_dir || inputs.terraform_dir }}
        id: plan
        continue-on-error: true
        env:
          WORKSPACE: ${{ github.event.inputs.workspace || inputs.workspace || 'dev' }}
          LAMBDA_NAME: ${{ github.event.inputs.lambda_name || inputs.lambda_name }}
        run: |
          terraform plan \
            -var="lambda_name=${LAMBDA_NAME}" \
            -out=lambda.tfplan \
            -detailed-exitcode
          echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Check for changes
        id: check_changes
        run: |
          if [ ${{ steps.plan.outputs.exitcode }} == 2 ]; then
            echo "Changes detected"
            echo "plan_changes_detected=true" >> $GITHUB_OUTPUT
          else
            echo "No changes detected"
            echo "plan_changes_detected=false" >> $GITHUB_OUTPUT
          fi
        shell: bash
        continue-on-error: false

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: lambda-plan
          path: ${{ github.event.inputs.terraform_dir || inputs.terraform_dir }}/lambda.tfplan
          retention-days: 5

