# Deploy to Dev (manual only - auto-deploy on main merge disabled)
name: Deploy Frontend - Dev

on:
  workflow_dispatch:

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to Dev
    needs: prepare
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    uses: ./.github/workflows/deploy-fe.yml
    secrets: inherit
    with:
      environment: dev
      image_tag: dev-${{ needs.prepare.outputs.short_sha }}
