# Deploy to Staging and Beta when a version tag is pushed
name: Deploy Frontend - Staging & Beta

on:
  workflow_dispatch:
  push:
    tags:
      - "v.*"

jobs:
  deploy-staging:
    name: Deploy to Staging
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    uses: ./.github/workflows/deploy-fe.yml
    secrets: inherit
    with:
      environment: staging
      image_tag: staging-${{ github.ref_name }}

  deploy-beta:
    name: Deploy to Beta
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    uses: ./.github/workflows/deploy-fe.yml
    secrets: inherit
    with:
      environment: beta
      image_tag: beta-${{ github.ref_name }}
