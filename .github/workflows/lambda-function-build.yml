name: Lambda Build

on:
  workflow_call:
    inputs:
      workspace:
        required: true
        type: string
      lambda_name:
        required: true
        type: string
      source_dir:
        required: true
        type: string
      output_zip:
        required: true
        type: string
      needs_contract_compile:
        required: false
        type: boolean
        default: false
    secrets:
      TESTNET_MNEMONIC:
        required: true
      MAINNET_MNEMONIC:
        required: true

jobs:
  build:
    name: Build Lambda
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: '**/yarn.lock'

      - name: Install dependencies
        run: |
          echo "Installing project dependencies..."
          yarn install --frozen-lockfile
          echo "Installing esbuild globally..."
          yarn global add esbuild
          echo "Verify esbuild installation..."
          esbuild --version

      - name: Build Lambda
        env:
          TESTNET_MNEMONIC: ${{ secrets.TESTNET_MNEMONIC }}
          MAINNET_MNEMONIC: ${{ secrets.MAINNET_MNEMONIC }}
        run: |
          # Set environment variables based on workspace
          set +x  # Disable command echoing
          if [ "${{ inputs.workspace }}" == "dev" ]; then
            export MNEMONIC="$TESTNET_MNEMONIC"
          else
            export MNEMONIC="$MAINNET_MNEMONIC"
          fi
          set -x  # Re-enable command echoing

          # Compile contracts if needed
          if [ "${{ inputs.needs_contract_compile }}" == "true" ]; then
            echo "Running yarn contracts:compile..."
            set +x  # Disable command echoing for contract compilation
            yarn contracts:compile || { echo "Contract compilation failed"; exit 1; }
            set -x  # Re-enable command echoing
          fi

          # Build lambda
          cd packages/lambda
          echo "Running yarn build..."
          yarn build || { echo "Lambda build failed"; exit 1; }

          # Create dist directory
          mkdir -p ../../dist

          # Copy the built zip to the expected location
          if [ "${{ inputs.workspace }}" == "dev" ]; then
            cp dist/staging/${{ inputs.source_dir }}/index.zip ../../dist/${{ inputs.output_zip }}
          else
            cp dist/mainnet/${{ inputs.source_dir }}/index.zip ../../dist/${{ inputs.output_zip }}
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-build
          path: dist/${{ inputs.output_zip }}
          retention-days: 5 