name: Update Relayer Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run analytics script
        run: |
          yarn workspace @repo/scripts analyze-auto-voting \
            --checkpoint apps/relayer-dashboard/public/data/report.json \
            --output apps/relayer-dashboard/public/data/report.json

      - name: Commit and push if report changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/relayer-dashboard/public/data/report.json
          if git diff --staged --quiet; then
            echo "No changes to report.json"
          else
            git commit -m "chore(relayer-dashboard): update auto-voting report [skip ci]"
            git push
          fi
