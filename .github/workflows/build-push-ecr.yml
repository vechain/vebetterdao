name: Build and Push to ECR

on:
    workflow_call:
        inputs:
            environment:
                description: "GitHub Environment to load secrets from"
                required: true
                type: string
            ecr_repository:
                description: "Name of the ECR repository"
                required: true
                type: string
            image_tag:
                description: "Tag for the Docker image"
                required: true
                type: string
            dockerfile_path:
                description: "Path to Dockerfile"
                required: false
                type: string
                default: "./Dockerfile"
            context_path:
                description: "Build context path"
                required: false
                type: string
                default: "."
            aws_region:
                description: "AWS region"
                required: false
                type: string
                default: "eu-west-1"
        secrets:
            aws_role_arn:
                description: "AWS IAM role ARN for OIDC authentication"
                required: true
        outputs:
            tag:
                description: "The image tag that was pushed"
                value: ${{ jobs.build-and-push.outputs.tag }}
            uri:
                description: "Full URI of the pushed image"
                value: ${{ jobs.build-and-push.outputs.uri }}

jobs:
    build-and-push:
        name: Build and Push Docker Image
        runs-on: b3tr-e2e
        environment: ${{ inputs.environment }}
        permissions:
            id-token: write
            contents: read
        outputs:
            tag: ${{ steps.meta.outputs.tag }}
            uri: ${{ steps.meta.outputs.uri }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-region: ${{ inputs.aws_region }}
                  role-to-assume: ${{ secrets.aws_role_arn }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Generate image metadata
              id: meta
              run: |
                  IMAGE_TAG="${{ inputs.image_tag }}"
                  REGISTRY="${{ steps.login-ecr.outputs.registry }}"
                  REPO="${{ inputs.ecr_repository }}"
                  IMAGE_URI="${REGISTRY}/${REPO}:${IMAGE_TAG}"
                  echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
                  echo "uri=${IMAGE_URI}" >> $GITHUB_OUTPUT

            # Create/reuse a persistent BuildKit builder
            # Named builder persists cache mounts on self-hosted runners
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
              with:
                  driver: docker-container
                  driver-opts: |
                      image=moby/buildkit:latest
                      network=host
                  # Named builder ensures cache mounts persist across runs
                  # on self-hosted runner
                  name: b3tr-builder
                  # Don't cleanup builder to preserve cache
                  cleanup: false

            - name: Check if contracts changed
              id: contracts-check
              run: |
                  # Check if packages/contracts has changes compared to main
                  if git diff --name-only origin/main...HEAD | grep -q "^packages/contracts/"; then
                    echo "changed=true" >> $GITHUB_OUTPUT
                    echo "Contracts changed - will build from local workspace"
                  else
                    echo "changed=false" >> $GITHUB_OUTPUT
                    echo "Contracts unchanged - will use npm package (faster build)"
                  fi

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: ${{ inputs.context_path }}
                  file: ${{ inputs.dockerfile_path }}
                  push: true
                  tags: ${{ steps.meta.outputs.uri }}
                  platforms: linux/amd64
                  provenance: false
                  sbom: false
                  # Use GitHub Actions cache only (ECR registry cache was too slow)
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  # Single-image build: NEXT_PUBLIC_* vars come from .env.production (placeholders)
                  # and are substituted at container startup via docker-entrypoint.sh
                  # USE_NPM_CONTRACTS=true when contracts haven't changed (skips Solidity build)
                  build-args: |
                      NODE_OPTIONS=${{ vars.NODE_OPTIONS || ''}}
                      USE_NPM_CONTRACTS=${{ steps.contracts-check.outputs.changed == 'false' }}
