name: Build and Push to ECR

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub Environment to load secrets from"
        required: true
        type: string
      ecr_repository:
        description: "Name of the ECR repository"
        required: true
        type: string
      image_tag:
        description: "Tag for the Docker image"
        required: true
        type: string
      dockerfile_path:
        description: "Path to Dockerfile (auto-detected if not specified)"
        required: false
        type: string
        default: ""
      context_path:
        description: "Build context path"
        required: false
        type: string
        default: "."
      aws_region:
        description: "AWS region"
        required: false
        type: string
        default: "eu-west-1"
      contracts_npm_version:
        description: "Version of @vechain/vebetterdao-contracts npm package (when using npm-based build)"
        required: false
        type: string
        default: "latest"
    secrets:
      aws_role_arn:
        description: "AWS IAM role ARN for OIDC authentication"
        required: true
    outputs:
      tag:
        description: "The image tag that was pushed"
        value: ${{ jobs.build-and-push.outputs.tag }}
      uri:
        description: "Full URI of the pushed image"
        value: ${{ jobs.build-and-push.outputs.uri }}
      contracts_changed:
        description: "Whether contracts package changed"
        value: ${{ jobs.build-and-push.outputs.contracts_changed }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: b3tr-e2e
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      uri: ${{ steps.meta.outputs.uri }}
      contracts_changed: ${{ steps.check-contracts.outputs.contracts }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Check if contracts changed
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: check-contracts
        with:
          filters: |
            contracts:
              - 'packages/contracts/**'

      - name: Determine Dockerfile
        id: dockerfile
        run: |
          # Use explicit path if provided, otherwise auto-detect
          if [ -n "${{ inputs.dockerfile_path }}" ]; then
            echo "path=${{ inputs.dockerfile_path }}" >> $GITHUB_OUTPUT
          elif [ "${{ steps.check-contracts.outputs.contracts }}" == "true" ]; then
            echo "Using standard Dockerfile (contracts changed)"
            echo "path=./Dockerfile" >> $GITHUB_OUTPUT
          else
            echo "Using npm-contracts Dockerfile (no contracts changes)"
            echo "path=./Dockerfile.npm-contracts" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ secrets.aws_role_arn }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@f2e9fc6c2b355c1890b65e6f6f0e2ac3e6e22f78 # v2.1.2

      - name: Generate image metadata
        id: meta
        run: |
          IMAGE_TAG="${{ inputs.image_tag }}"
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          REPO="${{ inputs.ecr_repository }}"
          IMAGE_URI="${REGISTRY}/${REPO}:${IMAGE_TAG}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "uri=${IMAGE_URI}" >> $GITHUB_OUTPUT

      # Create/reuse a persistent BuildKit builder
      # Named builder persists cache mounts on self-hosted runners
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          # Named builder ensures cache mounts persist across runs
          # on self-hosted runner
          name: b3tr-builder
          # Don't cleanup builder to preserve cache
          cleanup: false

      - name: Build and push Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: ${{ inputs.context_path }}
          file: ${{ steps.dockerfile.outputs.path }}
          push: true
          tags: ${{ steps.meta.outputs.uri }}
          platforms: linux/amd64
          provenance: false
          sbom: false
          # Use GitHub Actions cache only (ECR registry cache was too slow)
          cache-from: type=gha,scope=v2
          cache-to: type=gha,mode=max
          build-args: |
            APP_BUILD_ENV=${{ vars.APP_BUILD_ENV || ''}}
            NEXT_PUBLIC_APP_ENV=${{ vars.NEXT_PUBLIC_APP_ENV || ''}}
            NEXT_PUBLIC_APP_VERSION=${{ inputs.image_tag }}
            NEXT_PUBLIC_DELEGATOR_URL=${{ vars.NEXT_PUBLIC_DELEGATOR_URL || ''}}
            NEXT_PUBLIC_IPFS_PINNING_SERVICE=${{ vars.NEXT_PUBLIC_IPFS_PINNING_SERVICE || ''}}
            NEXT_PUBLIC_NETWORK_TYPE=${{ vars.NEXT_PUBLIC_NETWORK_TYPE || ''}}
            NEXT_PUBLIC_NFT_STORAGE_KEY=${{ vars.NEXT_PUBLIC_NFT_STORAGE_KEY || ''}}
            NEXT_PUBLIC_PRIVY_APP_ID=${{ vars.NEXT_PUBLIC_PRIVY_APP_ID || ''}}
            NEXT_PUBLIC_PRIVY_CLIENT_ID=${{ vars.NEXT_PUBLIC_PRIVY_CLIENT_ID || ''}}
            NEXT_PUBLIC_TRANSAK_API_KEY=${{ vars.NEXT_PUBLIC_TRANSAK_API_KEY || ''}}
            NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID=${{ vars.NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID || ''}}
            NEXT_PUBLIC_DATADOG_ENV=${{ vars.NEXT_PUBLIC_DATADOG_ENV || ''}}
            NEXT_PUBLIC_DATADOG_APP_TOKEN=${{ vars.NEXT_PUBLIC_DATADOG_APP_TOKEN || ''}}
            NEXT_PUBLIC_DATADOG_CLIENT_TOKEN=${{ vars.NEXT_PUBLIC_DATADOG_CLIENT_TOKEN || ''}}
            NEXT_PUBLIC_MIXPANEL_PROJECT_TOKEN=${{ vars.NEXT_PUBLIC_MIXPANEL_PROJECT_TOKEN || ''}}
            NODE_OPTIONS=${{ vars.NODE_OPTIONS || ''}}
            CONTRACTS_NPM_VERSION=${{ inputs.contracts_npm_version }}
