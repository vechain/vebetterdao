services:
  thor-solo-e2e:
    image: ghcr.io/vechain/thor:latest
    hostname: thor-solo-e2e
    container_name: thor-solo-e2e
    user: root
    environment:
      - DOCKER=1
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "apk update --no-cache && apk add --no-cache curl && thor solo --on-demand --persist --data-dir /data/thor --api-addr 0.0.0.0:8669 --api-cors '*' --verbosity 10 --api-allowed-tracers call",
      ]
    ports:
      - "8670:8669"
    healthcheck:
      test: curl --fail 0.0.0.0:8669/blocks/0 || exit 1
      interval: "2s"
      retries: 30
    volumes:
      - thor-data-e2e:/data/thor
    networks:
      - vechain-thor-e2e

networks:
  vechain-thor-e2e:
    driver: bridge
    name: vechain-thor-e2e
volumes:
  thor-data-e2e:
    driver: local
    name: thor-data-e2e
