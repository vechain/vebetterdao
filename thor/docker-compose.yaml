version: "3.7"

services:
  thor-solo:
    platform: linux/amd64
    build:
      dockerfile: Dockerfile
      context: ./
    user: root
    ports:
      - "8669:8669"
      - "11235:11235"
    healthcheck:
      test: curl --fail 0.0.0.0:8669/blocks/0 || exit 1
      interval: 2s
      retries: 30
    volumes:
      - thor-volume:/data/thor
    networks:
      - vechain-thor

volumes:
  thor-volume:

networks:
  vechain-thor:
    driver: bridge
    name: vechain-thor
