---
# AWS Configuration
aws_region: eu-west-1
aws_account_id: "211125319139"
environment: "testnet"

# Lambda Configuration
lambda_function_name: "start-emissions-round"
lambda_handler: "index.handler"
lambda_runtime: "nodejs20.x"
lambda_memory_size: 512
lambda_timeout: 900

# Lambda Build Path
lambda_source_dir: "packages/lambda/dist/testnet-staging/startRound"

# Schedule Configuration
schedule_expression: "cron(30 1 ? * TUE,THU,SAT *)" # Runs every Tuesday, Thursday and Saturday at 1:30 AM UTC
