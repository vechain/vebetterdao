project_name: b3tr-frontend
project_slug: governance-frontend
environment: prod
region: eu-west-1
account_id: "851725442887"

account_level_state_bucket: b3tr-terraform-state-prod
account_level_state_key: frontend/account-level/prod/terraform.tfstate
account_level_state_region: eu-west-1

service_name: governance-prod
domain: governance.vebetterdao.org
enable_custom_domain: true
manage_dns_records: false
route53_zone_name: governance.vebetterdao.org

image_tag: latest
cpu: 1024
memory: 2048
port: 3000
min_size: 1
max_size: 4
max_concurrency: 100
health_check_path: /
health_check_interval: 20
health_check_timeout: 10
health_check_healthy_threshold: 1
health_check_unhealthy_threshold: 3
node_env: production
auto_deployments_enabled: false

environment_variables:
  NEXT_PUBLIC_RUNTIME_ENV: prod

