---
# AWS Configuration
aws_region: eu-west-1
aws_account_id: "851725442887"
environment: "mainnet"

# Lambda Configuration
lambda_function_name: "discourse-notify"
lambda_handler: "index.handler"
lambda_runtime: "nodejs20.x"
lambda_memory_size: 512
lambda_timeout: 900

# Lambda Build Path
lambda_source_dir: "packages/lambda/dist/mainnet/discourseNotify"

# Schedule Configuration
# Runs every Monday at 9:00 AM UTC
schedule_expression: "cron(00 9 ? * MON *)" # Runs every Monday at 9:00 AM UTC
