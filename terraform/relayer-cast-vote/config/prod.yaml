---
# AWS Configuration
aws_region: eu-west-1
aws_account_id: "851725442887"
environment: "mainnet"

# Lambda Configuration
lambda_function_name: "relayer-cast-vote"
lambda_handler: "index.handler"
lambda_runtime: "nodejs20.x"
lambda_memory_size: 512
lambda_timeout: 900

# Lambda Build Path
lambda_source_dir: "packages/lambda/dist/mainnet/relayerCastVote"

# Schedule Configuration
# Runs 10 minutes after start-emissions-round (which runs at 6:44 AM on Monday)
# This ensures the round has started and is ready for auto-voting
schedule_expression: "cron(54 6 ? * MON *)" # Runs every Monday at 6:54 AM UTC
