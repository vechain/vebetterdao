---
# AWS Configuration
aws_region: eu-west-1
aws_account_id: "851725442887"
environment: "mainnet"

# Lambda Configuration
lambda_function_name: "check-endorsement"
lambda_handler: "index.handler"
lambda_runtime: "nodejs20.x"
lambda_memory_size: 512
lambda_timeout: 30

# Lambda Build Path
lambda_source_dir: "packages/lambda/dist/mainnet/checkEndorsements"

# Schedule Configuration
schedule_expression: "cron(0 9 ? * 1,3,6 *)"  # Runs on Monday, Wednesday, Saturday at 9 AM UTC
